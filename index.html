<!DOCTYPE html>
<html>
        <head>
            <title>foot</title>
            <link rel="stylesheet" href="index.css">
        </head>

        <body>
            <header>
                <h1>FootSpace</h1>
                <p>Registrate</p>
            </header>

            <main>
                <section>
                    <article>
                            <form>
                                <label for="nombre">Nombre</label><br>
                                <input class="nombres" type="text" name="nombre" id="nombre" placeholder="Nombre" required><br><br>

                                <label for="correo">Correo</label><br>
                                <input class="correos" type="email" name="correo" id="correo" placeholder="Correo" required><br><br>

                                <label for="contraseña">Contraseña</label><br>
                                <input class="contraseñas" type="password" name="contraseña" id="contraseña" placeholder="Contraseña" required><br><br>

                                <input class="btn" type="submit" value="Registrar"> <br><br>
                            </form>
                    </article>
                </section>
            </main>
        </body>
</html>
