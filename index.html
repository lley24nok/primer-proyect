<!DOCTYPE html>
<html lang="Es">
    
    <head>
        <title>pagina de registro</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>

        <header>
            <h1>formulario</h1>
            <p>registrese porfa</p>
        </header>
        
    <main>
        <div class="formulario">
            <form>
                    <label for="nombre">nombre</label><br>
                    <input type="text" name="nombre" id="nombre" placeholder="Nombre" required><br><br>

                    <label for="email">Correo</label><br>
                    <input type="email" name="Correo" id="email" placeholder="Correo"  required><br><br>

                    <label for="mensaje">mensaje</label><br>
                    <textarea name="mensaje" id="mensaje" rows="5" cols="30" placeholder="Mensaje"></textarea><br><br>

                    <input class="btn" type="Submit" value="registrar">
            </form>
        </div>
    </main>
    </body>

</html>
